[kodama]
trees = "trees"
assets = "assets"
base-url = "/"
theme-lock = false
themes = []

[toc]
placement = "right"
sticky = true
mobile-sticky = true
max-width = "max-content"

[text]
edit = "[edit]"
toc = "Table of Contents"
references = "References"
backlinks = "Backlinks"

[build]
typst-root = "trees"
short-slug = false
pretty-urls = false
footer-mode = "embed"
footer-sort-by = "slug"
inline-css = false
inline-script = false
allow-unsafe-html = false
asref = true
output = "./publish"

[serve]
edit = "vscode://file/"
output = "./.cache/publish"
command = ["miniserve", "<output>", "--index", "index.html", "--pretty-urls", "--port", "8087"]

[publish]
rss = false
